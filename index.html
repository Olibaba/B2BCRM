<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B CRM - Home</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 700px; margin: 0 auto; }
        .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; background-color: white; }
        button { background-color: #00c853; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #009624; }
        #statusMessage { margin-top: 15px; font-weight: bold; text-align: center; }
        
        /* Table Styling for CRM Records */
        .records-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        tr:hover { background-color: #f1f3f5; }
        
        /* Visual Status Badges */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge-prospect { background-color: #e3f2fd; color: #0d47a1; }
        .badge-active { background-color: #e8f5e9; color: #1b5e20; }
        .badge-inactive { background-color: #ffebee; color: #b71c1c; }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h2>Add New B2B Account</h2>
            <form id="crmForm">
                <div class="form-group">
                    <label for="companyName">Company Name:</label>
                    <input type="text" id="companyName" required placeholder="e.g., Acme Wholesale Ltd">
                </div>
                <div class="form-group">
                    <label for="companyAddress">Shipping Address:</label>
                    <input type="text" id="companyAddress" required placeholder="Street, City, Country">
                </div>
                <div class="form-group">
                    <label for="accountStatus">Account Status:</label>
                    <select id="accountStatus">
                        <option value="Prospect">Prospect</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit">Save to CRM</button>
            </form>
            <div id="statusMessage"></div>
        </div>

        <div class="records-container">
            <h3>Active CRM Accounts Directory</h3>
            <table>
                <thead>
                    <tr>
                        <th>Company Name</th>
                        <th>Shipping Address</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="crmTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Database Connection Configuration
        const SUPABASE_URL = "https://hutdwxxswfkamukqzxin.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_p3GjTv-W-kC2eSndATE5tw_YpBiHC8r"; // Make sure to keep your working key here!
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // FEATURE 1: Fetch and Display Accounts (READ)
        async function fetchAccounts() {
            console.log("Fetching latest accounts from database...");
            
            const { data: companies, error } = await supabaseClient
                .from('companies')
                .select('name, address, status') // Added 'status' to the database pull request
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error loading directory:", error);
                return;
            }

            const tableBody = document.getElementById('crmTableBody');
            tableBody.innerHTML = ""; 

            companies.forEach(company => {
                const row = document.createElement('tr');
                
                // Determine CSS style based on lifecycle status
                const currentStatus = company.status || 'Prospect';
                const badgeClass = `badge badge-${currentStatus.toLowerCase()}`;

                row.innerHTML = `
                    <td><strong>${company.name}</strong></td>
                    <td>${company.address}</td>
                    <td><span class="${badgeClass}">${currentStatus}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        // FEATURE 2: Handle Form Submission (CREATE)
        document.getElementById('crmForm').addEventListener('submit', async (event) => {
            event.preventDefault(); 
            
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.style.color = "blue";
            statusMessage.innerText = "Saving account...";

            const name = document.getElementById('companyName').value;
            const address = document.getElementById('companyAddress').value;
            const status = document.getElementById('accountStatus').value; // Captured the dropdown selection

            const { data, error } = await supabaseClient
                .from('companies')
                .insert([{ name: name, address: address, status: status }]); // Added status here

            if (error) {
                statusMessage.style.color = "red";
                statusMessage.innerText = "Error: " + error.message;
            } else {
                statusMessage.style.color = "green";
                statusMessage.innerText = "Account successfully saved!";
                document.getElementById('crmForm').reset(); 
                fetchAccounts(); 
            }
        });

        // Run automatically on load
        fetchAccounts();
    </script>
</body>
</html>
